# 周更入库工作流
# 触发：
#   1) cron: 每周一 09:00 UTC+8 (= 01:00 UTC)
#   2) workflow_dispatch: 手动跑
# 流程：fetch → classify → build_index → 开 PR 等 review
# 注意：本身不直接 push，由 PR 合并触发 pages.yml 重部署

name: Weekly Auto Update

on:
  schedule:
    - cron: '0 1 * * 1'   # 周一 01:00 UTC = 周一 09:00 UTC+8
  workflow_dispatch:
    inputs:
      dry_run:
        description: '只跑不提交 PR（调试用）'
        required: false
        default: 'false'

permissions:
  contents: write       # 创建分支 + push
  pull-requests: write  # 开 PR
  issues: write

concurrency:
  group: weekly-update
  cancel-in-progress: true

jobs:
  collect:
    name: 抓取 + 分类 + 开 PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('automation/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r automation/requirements.txt
        shell: bash

      - name: Fetch new items
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: python automation/fetch.py
        shell: bash

      - name: Classify & format
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
        run: python automation/classify.py
        shell: bash

      - name: Rebuild index
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python automation/build_index.py
        shell: bash

      - name: Check changes
        id: diff
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "无新增内容，跳过 PR"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "有变更，准备开 PR"
            git status --short
          fi
        shell: bash

      - name: Open PR
        if: steps.diff.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          BRANCH="auto/weekly-update-$(date +%Y%m%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "chore(weekly): 自动入库 $(date +%Y-%m-%d)" \
            --author="github-actions[bot] <github-actions[bot]@users.noreply.github.com>"
          git push origin "$BRANCH" --force-with-lease

          PR_URL=$(gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "🤖 周更入库 · $(date +%Y-%m-%d)" \
            --body "## 自动周更入库

          **触发时间**：$(date -u +%Y-%m-%dT%H:%M:%SZ)
          **新增案例**：见 \`automation/output/new_cases.json\`
          **信息源**：\`automation/sources.yaml\`

          ## Review Checklist
          - [ ] 案例质量（不是营销软文 / 重复 / 不相关）
          - [ ] 行业分类正确（金融/医疗/零售/教育/制造/政务/文娱/物流）
          - [ ] 资产分类正确（01-08 哪个目录）
          - [ ] 没有泄密（公开信息为准）

          merge 后会自动部署 GitHub Pages。")
          echo "PR: $PR_URL"
          # 尝试加 label（不阻塞主流程，label 不存在也不挂）
          gh pr edit "$PR_URL" --add-label "weekly-update" 2>/dev/null || true
          gh pr edit "$PR_URL" --add-label "auto" 2>/dev/null || true
        shell: bash