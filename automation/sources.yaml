# ============================================
# AI 项目落地研究 · 信息源清单
# ============================================
# 由周更 cron 读取。
# 想加新源？直接加一条，开 PR 即可，下次 cron 自动生效。
#
# 支持三种 type：
#   1) web        - 公开网页 / RSS / 视频站 / 公众号链接
#                    通过 web_search 或 RSS 抓取
#   2) github_repo- GitHub 仓库（release / commit / issue）
#                    通过 GitHub REST API 抓取
#   3) rss        - 标准 RSS / Atom feed
#                    通过 feedparser 抓取
#
# 去重：脚本会用 URL + title 做 SHA1 去重，已经入库的不会重复抓。
# ============================================

sources:

  # ---------- A. 公开网页 / 内容站点（已弃用） ----------
  # 这些源用 web type + 正则抓链接，但 36氪/虎嗅/量子位 都已经反爬到
  # 抓不到正文了；改用下方 C 区标准 RSS 源。
  # 保留注释以备历史追溯。
  # - type: web
  #   name: 36氪 AI 频道（已替换为 RSS）
  #   url: https://36kr.com/information/AI
  # - type: web
  #   name: 机器之心（SPA 无 RSS，已弃）
  #   url: https://www.jiqizhixin.com
  # - type: web
  #   name: 量子位（无 RSS，已弃）
  #   url: https://www.qbitai.com
  # - type: web
  #   name: 虎嗅 AI 频道（连接超时，已弃）
  #   url: https://www.huxiu.com/ai

  # ---------- A+. 视频站（B 站暂停） ----------
  # RSSHub 公开实例 + B 站搜索 API 在本机都拉不到数据
  # （RSSHub 全部超时/挂，搜索 API 直接 412 风控）
  # 后续如需恢复，需要登录态 cookie 或 wbi 签名
  - type: bilibili_user
    name: 马想聊AI
    mid: 3546675022924733
    keywords: [AI落地, 大模型, 行业应用]
    enabled: false  # 暂停：B 站 API 412 风控

  - type: bilibili_user
    name: Jason程前
    mid: 3493095467387119
    keywords: [AI, 创业, 行业]
    enabled: false  # 暂停：B 站 API 412 风控

  - type: bilibili_user
    name: 程前朋友圈
    mid: 393780888
    keywords: [AI, 商业, 行业]
    enabled: false  # 暂停：B 站 API 412 风控

  - type: bilibili_user
    name: 光羽的平行世界
    # 注：B 站搜索 API 返回的真实 mid；用户最初给的 354671130014396 是错位的
    mid: 3546571130014396
    keywords: [AI, 科技, 未来]
    enabled: false  # 暂停：B 站 API 412 风控

  # 微信公众号：搜狗微信搜索作为入口（仅公开文章）
  - type: web
    name: 微信公众号聚合（搜狗微信）
    url: https://weixin.sogou.com/weixin?type=2&query=AI%E8%90%BD%E5%9C%B0
    keywords: [AI落地, 行业案例, AI应用]
    enabled: false  # 搜狗微信反爬较严，先关

  # ---------- B. GitHub 仓库（API 抓取） ----------
  - type: github_repo
    name: awesome-industrial-ai
    url: https://github.com/Industrial-AI/awesome-industrial-ai
    track: releases
    enabled: true

  - type: github_repo
    name: awesome-ai-in-finance
    url: https://github.com/georgezouq/awesome-ai-in-finance
    track: releases
    enabled: true

  - type: github_repo
    name: awesome-medical-ai
    url: https://github.com/analysiscenter/awesome-medical-ai
    track: releases
    enabled: true

  # ---------- C. RSS（标准 feed） ----------
  # 中文 AI 落地优质源（实测 RSS 可达）
  - type: rss
    name: 36氪
    url: https://36kr.com/feed
    enabled: true
    # 创业/商业视角，AI 落地报道密度高

  - type: rss
    name: InfoQ 中文
    url: https://www.infoq.cn/feed.xml
    enabled: true
    # 企业技术/架构/AI 落地方法论

  - type: rss
    name: 人人都是产品经理
    url: https://www.woshipm.com/feed
    enabled: true
    # 接地气的产品/落地分析

  - type: rss
    name: 雷锋网
    url: https://www.leiphone.com/feed
    enabled: true
    # AI/智能硬件/产业应用

  # 国际英文 AI 源（参考用）
  - type: rss
    name: Hugging Face Blog
    url: https://huggingface.co/blog/feed.xml
    enabled: true

  - type: rss
    name: OpenAI Blog
    url: https://openai.com/blog/rss.xml
    enabled: true

  - type: rss
    name: Google DeepMind Blog
    url: https://deepmind.google/blog/rss.xml
    enabled: true


# ============================================
# 全局过滤（可选）
# ============================================
# 抓下来的内容如果标题/摘要包含以下关键词会被丢弃
filters:
  exclude_keywords:
    - 招聘
    - 求职
    - 课程优惠
    - 限时折扣
    - 招股说明书
    - 财报

# 抓取时间窗（天）：只抓过去 N 天的内容
window_days: 7

# 每源最多抓多少条
max_per_source: 20